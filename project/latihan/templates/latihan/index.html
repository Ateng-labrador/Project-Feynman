{% extends "base.html" %}

{% block content %}
    <ul class="nav">
        <li class="nav-item">
            <a class="nav-link" href="/latihan" title="">
                All-post
            </a>
        </li>
    {% for dataCategory in Categories %}
        <li class="nav-item">
            <a class = "nav-link" href="/latihan/category/{{dataCategory.category}}">
                {{dataCategory.category}}
            </a>
        </li>
    {% endfor %}
    </ul>


    {% for post in Posts %}
        <p><b>{{post.category}}</b></p>
        <a href="/latihan/post/{{post.slug}}" title="">
            <h1>{{post.judul}}</h1>
        </a>
        <p>{{post.publish}}</p>
        <p>{{post.body| truncatechars:200}}</p>
    {% endfor %}
{% endblock content %}
